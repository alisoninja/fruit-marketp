<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>農產報價 Pro — 全台批發市場交易行情</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-sq"><div class="logo-sq-i"></div></div>
    農產報價 Pro
  </div>
  <div class="topbar-right">
    <div class="font-ctrl">
      <button class="font-btn" onclick="fontSizeDecrease()" aria-label="縮小字體">A−</button>
      <button class="font-btn" onclick="fontSizeIncrease()" aria-label="放大字體">A+</button>
    </div>
    <nav class="topbar-nav">
      <a href="index.html"     class="nav-link active">行情總覽</a>
      <a href="watchlist.html" class="nav-link">我的關注</a>
      <a href="contact.html"   class="nav-link">聯絡我們</a>
    </nav>
  </div>
</header>

<div class="data-update-bar">
  <div class="data-update-dot" id="update-dot"></div>
  <span id="data-updated-at">資料載入中…</span>
</div>

<div class="filter-bar">
  <div class="cat-pills">
    <button class="cpill active" id="tab-fruit" onclick="switchMainCat('fruit')">水果</button>
    <button class="cpill"        id="tab-vege"  onclick="switchMainCat('vege')">蔬菜</button>
  </div>
  <div class="unit-switcher">
    <span class="filter-label">價格：</span>
    <div class="seg" id="price-unit-seg">
      <button class="seg-btn active" onclick="setPriceUnit('kg',this)">元/公斤</button>
      <button class="seg-btn"        onclick="setPriceUnit('jin',this)">元/台斤</button>
    </div>
    <span class="filter-label" style="margin-left:6px">成交量：</span>
    <div class="seg" id="vol-unit-seg">
      <button class="seg-btn active blue" onclick="setVolUnit('jin',this)">台斤</button>
      <button class="seg-btn"             onclick="setVolUnit('kg',this)">公斤</button>
      <button class="seg-btn"             onclick="setVolUnit('ton',this)">公噸</button>
    </div>
  </div>
</div>
<div class="loading-bar"><div class="loading-fill active" id="loading-fill"></div></div>

<div class="page-content">

  <div style="margin-bottom:12px">
    <div class="cat-pills" id="sub-pills" style="flex-wrap:wrap;gap:5px"></div>
  </div>

  <div class="card" style="margin-bottom:12px">
    <div class="card-title">全台成交總量 <span class="card-title-sub" id="total-summary-sub">今日</span></div>
    <div class="summary-row" id="total-summary-row"></div>
  </div>

  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:12px">
    <div class="card">
      <div class="card-title">漲幅排行 <span class="card-title-sub">今日漲最多</span></div>
      <div class="rank-list" id="rank-up"></div>
    </div>
    <div class="card">
      <div class="card-title">跌幅排行 <span class="card-title-sub">今日跌最多</span></div>
      <div class="rank-list" id="rank-down"></div>
    </div>
  </div>

  <div class="card" style="margin-bottom:12px">
    <div class="card-title" id="grid-title">水果總覽 <span class="card-title-sub">點擊商品查看詳情</span></div>
    <div class="overview-grid" id="overview-grid"></div>
  </div>

  <div id="detail-section" style="display:none">

    <div class="card" style="margin-bottom:12px">
      <div class="card-title" style="margin-bottom:6px">
        <span id="det-title">—</span>
        <span class="card-title-sub" id="det-sub"></span>
      </div>
      <div class="price-type-tabs">
        <button class="ptt active auction" id="ptab-a" onclick="setPriceType('auction')">拍賣價 <span class="badge badge-auction">批發市場</span></button>
        <button class="ptt wholesale"      id="ptab-w" onclick="setPriceType('wholesale')">行口價 <span class="badge badge-wholesale">行口盤商</span></button>
      </div>
      <div class="ptype-note" id="ptype-note"></div>
      <div class="summary-row" id="det-sum-row"></div>
    </div>

    <div class="card" style="margin-bottom:12px">
      <div class="card-title">同品種全規格比較 <span class="card-title-sub" id="var-sub"></span></div>
      <div style="overflow-x:auto">
        <table class="variety-table">
          <thead><tr>
            <th>品種名稱</th><th>類型</th>
            <th class="r" id="th-avg">均價</th>
            <th class="r">漲跌</th>
            <th class="r hide-mobile" id="th-hi">上價</th>
            <th class="r hide-mobile" id="th-lo">下價</th>
            <th class="r" id="th-vol">成交量</th>
          </tr></thead>
          <tbody id="var-body"></tbody>
        </table>
      </div>
    </div>

    <div class="main-layout" style="margin-bottom:12px">
      <div class="col-left">
        <div class="card">
          <div class="card-title">價格趨勢 <span class="card-title-sub">農業部實際資料</span></div>
          <div class="chart-toolbar">
            <div class="tab-group" id="range-tg">
              <button class="tb"        onclick="setRange(7,this)">週</button>
              <button class="tb active" onclick="setRange(30,this)">月</button>
              <button class="tb"        onclick="setRange(90,this)">季</button>
            </div>
            <div class="tab-group">
              <button class="tb" onclick="toggleLayer('ma',this)">MA均線</button>
              <button class="tb" onclick="toggleLayer('vol',this)">交易量</button>
            </div>
          </div>
          <div class="legend-row" id="trend-legend"></div>
          <div style="position:relative;width:100%;height:200px">
            <canvas id="trendC" role="img" aria-label="價格趨勢圖">趨勢圖</canvas>
          </div>
          <div id="vol-wrap" style="position:relative;width:100%;height:52px;margin-top:4px;display:none">
            <canvas id="volC" role="img" aria-label="交易量">交易量</canvas>
          </div>
          <div class="season-note" id="season-note"></div>
        </div>
      </div>
      <div class="col-right">
        <div class="card">
          <div class="card-title">全台市場成交比較 <span class="card-title-sub" id="mkt-sub"></span></div>
          <div class="price-type-tabs" style="margin-bottom:8px">
            <button class="ptt active auction" id="mptab-a" onclick="setMktType('auction')">拍賣市場</button>
            <button class="ptt wholesale"      id="mptab-w" onclick="setMktType('wholesale')">行口市場</button>
          </div>
          <div class="market-list" id="mkt-section"></div>
        </div>
        <div class="card">
          <div class="card-title" id="news-ct">相關新聞 <span class="card-title-sub">農傳媒 · 農糧署</span></div>
          <div id="news-list"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<footer class="footer">
  Produced by 密菓子 · 農產報價 Pro v1.0.0 · 資料來源：農業部開放資料平台
</footer>

<!-- Bottom Nav：純 SVG icon，currentColor 自動切換 -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">

    <a href="index.html" class="bnav-item active" aria-label="行情總覽">
      <div class="bnav-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="12" width="4" height="9" rx="1" fill="currentColor" stroke="none"/>
          <rect x="10" y="7" width="4" height="14" rx="1" fill="currentColor" stroke="none"/>
          <rect x="17" y="3" width="4" height="18" rx="1" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <span class="bnav-label">行情總覽</span>
    </a>

    <a href="watchlist.html" class="bnav-item" aria-label="我的關注">
      <div class="bnav-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="bnav-label">我的關注</span>
    </a>

    <a href="contact.html" class="bnav-item" aria-label="聯絡我們">
      <div class="bnav-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="2"
            fill="none" stroke="currentColor" stroke-width="1.8"/>
          <polyline points="2,4 12,13 22,4"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="bnav-label">聯絡我們</span>
    </a>

  </div>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="js/data.js"></script>
<script src="js/units.js"></script>
<script src="js/charts.js"></script>
<script src="js/news.js"></script>
<script src="js/overview.js"></script>
</body>
</html>
