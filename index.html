<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>農產行情專業版 — 全台批發市場交易行情</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== Topbar ===== -->
<header class="topbar">
  <div class="logo">
    <div class="logo-sq"><div class="logo-sq-i"></div></div>
    農產行情專業版
  </div>

  <nav class="topbar-nav">
    <a href="index.html" class="nav-link active">行情總覽</a>
    <a href="contact.html" class="nav-link">聯絡我們</a>
  </nav>

  <div class="topbar-right">
    <span class="pill" id="clock-pill">--:--:--</span>
    <span class="pill live" id="date-pill">載入中</span>
    <span class="pill">農業部 · 高雄 · 台中市場</span>
  </div>
</header>

<!-- ===== Filter Bar ===== -->
<div class="filter-bar">
  <!-- 種類 pills -->
  <div class="cat-pills" id="cat-pills"></div>

  <!-- 作物快速切換 -->
  <div id="crop-nav" style="display:flex;gap:4px;flex-wrap:wrap;margin-left:4px"></div>

  <!-- 單位切換 -->
  <div class="unit-switcher">
    <span class="filter-label">價格：</span>
    <div class="seg" id="price-unit-seg">
      <button class="seg-btn active" onclick="setPriceUnit('kg', this)">元/公斤</button>
      <button class="seg-btn" onclick="setPriceUnit('jin', this)">元/台斤</button>
    </div>
    <span class="filter-label" style="margin-left:6px">成交量：</span>
    <div class="seg" id="vol-unit-seg">
      <button class="seg-btn active blue" onclick="setVolUnit('jin', this)">台斤</button>
      <button class="seg-btn" onclick="setVolUnit('kg', this)">公斤</button>
      <button class="seg-btn" onclick="setVolUnit('ton', this)">公噸</button>
    </div>
  </div>
</div>

<!-- 載入指示列 -->
<div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>

<!-- ===== Main Layout ===== -->
<div class="main-layout">

  <!-- ===== 左欄 ===== -->
  <div class="col-left">

    <!-- 摘要卡片 -->
    <div class="card">
      <div class="card-title" style="margin-bottom:8px">
        <span id="crop-title">—</span>
        <span class="card-title-sub" id="crop-sub">請選擇作物</span>
      </div>

      <!-- 拍賣 / 行口 切換 -->
      <div class="price-type-tabs">
        <button class="ptt active auction" id="ptab-a" onclick="setPriceType('auction')">
          拍賣價 <span class="badge badge-auction">批發市場拍賣</span>
        </button>
        <button class="ptt wholesale" id="ptab-w" onclick="setPriceType('wholesale')">
          行口價 <span class="badge badge-wholesale">行口盤商</span>
        </button>
      </div>

      <div class="ptype-note" id="ptype-note"></div>
      <div class="summary-row" id="sum-row"></div>
    </div>

    <!-- 同品種全規格比較表 -->
    <div class="card">
      <div class="card-title">
        同品種全規格比較
        <span class="card-title-sub" id="var-sub"></span>
      </div>
      <div style="overflow-x:auto">
        <table class="variety-table">
          <thead>
            <tr>
              <th>品種名稱</th>
              <th>類型</th>
              <th class="r" id="th-avg">均價</th>
              <th class="r">漲跌</th>
              <th class="r" id="th-hi">上價</th>
              <th class="r" id="th-lo">下價</th>
              <th class="r" id="th-vol">成交量</th>
            </tr>
          </thead>
          <tbody id="var-body"></tbody>
        </table>
      </div>
    </div>

    <!-- 趨勢圖 -->
    <div class="card">
      <div class="card-title">
        價格趨勢
        <span class="card-title-sub">含季節性比較與歷史價格帶</span>
      </div>

      <div class="chart-toolbar">
        <div class="tab-group" id="range-tg">
          <button class="tb" onclick="setRange(7, this)">週</button>
          <button class="tb active" onclick="setRange(30, this)">月</button>
          <button class="tb" onclick="setRange(90, this)">季</button>
          <button class="tb" onclick="setRange(365, this)">年</button>
        </div>
        <div class="tab-group">
          <button class="tb" onclick="toggleLayer('lastYear', this)">去年同期</button>
          <button class="tb" onclick="toggleLayer('band', this)">歷史價格帶</button>
          <button class="tb" onclick="toggleLayer('ma', this)">MA均線</button>
          <button class="tb" onclick="toggleLayer('vol', this)">交易量</button>
        </div>
      </div>

      <div class="legend-row" id="trend-legend"></div>

      <div style="position:relative;width:100%;height:210px">
        <canvas id="trendC" role="img" aria-label="農產品價格趨勢折線圖">農產品趨勢圖</canvas>
      </div>

      <div id="vol-wrap" style="position:relative;width:100%;height:55px;margin-top:4px;display:none">
        <canvas id="volC" role="img" aria-label="交易量柱狀圖">交易量</canvas>
      </div>

      <div class="season-note" id="season-note"></div>
    </div>

  </div>

  <!-- ===== 右欄 ===== -->
  <div class="col-right">

    <!-- 全台市場成交比較 -->
    <div class="card">
      <div class="card-title">
        全台市場成交比較
        <span class="card-title-sub" id="mkt-sub">今日</span>
      </div>

      <div class="price-type-tabs" style="margin-bottom:10px">
        <button class="ptt active auction" id="mptab-a" onclick="setMktType('auction')">拍賣市場</button>
        <button class="ptt wholesale" id="mptab-w" onclick="setMktType('wholesale')">行口市場</button>
      </div>

      <div class="market-list" id="mkt-section"></div>
    </div>

    <!-- 相關新聞 -->
    <div class="card">
      <div class="card-title" id="news-ct">相關新聞</div>
      <div id="news-list"></div>
    </div>

  </div>
</div>

<!-- ===== Footer ===== -->
<footer class="footer">
  © 2025 農產行情專業版 · 資料來源：農業部農業開放資料平台 ·
  <a href="contact.html" style="color:var(--green-mid)">聯絡我們</a>
</footer>

<!-- ===== Scripts ===== -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="js/units.js"></script>
<script src="js/charts.js"></script>
<script src="js/main.js"></script>

</body>
</html>
