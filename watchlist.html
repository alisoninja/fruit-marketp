<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>我的關注 — 農產報價 Pro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-sq"><div class="logo-sq-i"></div></div>
    農產報價 Pro
  </div>
  <div class="topbar-right">
    <div class="font-ctrl">
      <button class="font-btn" onclick="fontSizeDecrease()" aria-label="縮小字體">A−</button>
      <button class="font-btn" onclick="fontSizeIncrease()" aria-label="放大字體">A+</button>
    </div>
    <nav class="topbar-nav">
      <a href="index.html"     class="nav-link">行情總覽</a>
      <a href="watchlist.html" class="nav-link active">我的關注</a>
      <a href="contact.html"   class="nav-link">聯絡我們</a>
    </nav>
  </div>
</header>

<!-- 初始設定畫面 -->
<div id="setup-screen" style="display:none">
  <div class="watchlist-setup">
    <h2>建立你的關注清單</h2>
    <p>選擇你想追蹤的水果或蔬菜，可以多選，之後可隨時修改。</p>
    <div class="pick-section">
      <div class="pick-section-title">水果</div>
      <div class="pick-grid" id="pick-fruit"></div>
    </div>
    <div class="pick-section">
      <div class="pick-section-title">蔬菜</div>
      <div class="pick-grid" id="pick-vege"></div>
    </div>
    <button class="setup-confirm-btn" id="confirm-btn" disabled onclick="confirmSetup()">確認，開始追蹤</button>
  </div>
</div>

<!-- 主畫面 -->
<div id="main-screen" style="display:none">

  <div class="watchlist-tabs" id="watch-tabs"></div>

  <div class="data-update-bar">
    <div class="data-update-dot" id="update-dot"></div>
    <span id="data-updated-at">資料載入中…</span>
  </div>

  <div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>

  <div class="filter-bar">
    <div class="unit-switcher" style="margin-left:0;width:100%">
      <span class="filter-label">價格：</span>
      <div class="seg">
        <button class="seg-btn" onclick="setPriceUnit('kg',this)">元/公斤</button>
        <button class="seg-btn active" onclick="setPriceUnit('jin',this)">元/台斤</button>
      </div>
      <span class="filter-label" style="margin-left:6px">成交量：</span>
      <div class="seg">
        <button class="seg-btn active blue" onclick="setVolUnit('jin',this)">台斤</button>
        <button class="seg-btn"             onclick="setVolUnit('kg',this)">公斤</button>
        <button class="seg-btn"             onclick="setVolUnit('ton',this)">公噸</button>
      </div>
    </div>
  </div>

  <div class="page-content">

    <!-- 子品種選擇器 -->
    <div style="margin-bottom:10px" id="w-sub-picker-wrap">
      <div style="font-size:0.79rem;color:var(--text-secondary);margin-bottom:5px;font-weight:500">選擇品種：</div>
      <div id="w-sub-variety-picker" class="cat-pills" style="flex-wrap:wrap;gap:5px;display:none"></div>
    </div>

    <!-- 摘要卡 -->
    <div class="card" style="margin-bottom:12px">
      <div class="card-title" style="margin-bottom:6px">
        <span id="w-crop-title">—</span>
        <span class="card-title-sub" id="w-crop-sub"></span>
      </div>
      <div class="price-type-tabs">
        <button class="ptt active auction" id="w-ptab-a" onclick="wSetPriceType('auction')">拍賣價 <span class="badge badge-auction">批發市場</span></button>
        <button class="ptt wholesale"      id="w-ptab-w" onclick="wSetPriceType('wholesale')">行口價 <span class="badge badge-wholesale">行口盤商</span></button>
      </div>
      <div class="ptype-note" id="w-ptype-note"></div>
      <div class="summary-row" id="w-sum-row"></div>
    </div>

    <!-- 同品種比較表 -->
    <div class="card" style="margin-bottom:12px">
      <div class="card-title">同品種全規格比較 <span class="card-title-sub" id="w-var-sub"></span></div>
      <div style="overflow-x:auto">
        <table class="variety-table">
          <thead><tr>
            <th>品種名稱</th><th>類型</th>
            <th class="r" id="w-th-avg">均價</th>
            <th class="r">漲跌</th>
            <th class="r hide-mobile" id="w-th-hi">上價</th>
            <th class="r hide-mobile" id="w-th-lo">下價</th>
            <th class="r" id="w-th-vol">成交量</th>
          </tr></thead>
          <tbody id="w-var-body"></tbody>
        </table>
      </div>
    </div>

    <!-- 趨勢 + 市場 -->
    <div class="main-layout" style="margin-bottom:12px">
      <div class="col-left">
        <div class="card">
          <div class="card-title">價格趨勢 <span class="card-title-sub">農業部實際資料</span></div>
          <div class="chart-toolbar">
            <div class="tab-group" id="w-range-tg">
              <button class="tb"        onclick="wSetRange(7,this)">週</button>
              <button class="tb active" onclick="wSetRange(30,this)">月</button>
              <button class="tb"        onclick="wSetRange(90,this)">季</button>
            </div>
            <div class="tab-group">
              <button class="tb" onclick="wToggleLayer('ma',this)">MA均線</button>
              <button class="tb" onclick="wToggleLayer('vol',this)">交易量</button>
            </div>
          </div>
          <div class="legend-row" id="w-trend-legend"></div>
          <div style="position:relative;width:100%;height:200px">
            <canvas id="w-trendC" role="img" aria-label="價格趨勢圖">趨勢圖</canvas>
          </div>
          <div id="w-vol-wrap" style="position:relative;width:100%;height:52px;margin-top:4px;display:none">
            <canvas id="w-volC" role="img" aria-label="交易量">交易量</canvas>
          </div>
          <div class="season-note" id="w-season-note"></div>
        </div>
      </div>
      <div class="col-right">
        <div class="card">
          <div class="card-title">全台市場成交比較 <span class="card-title-sub" id="w-mkt-sub"></span></div>
          <div class="price-type-tabs" style="margin-bottom:8px">
            <button class="ptt active auction" id="w-mptab-a" onclick="wSetMktType('auction')">拍賣市場</button>
            <button class="ptt wholesale"      id="w-mptab-w" onclick="wSetMktType('wholesale')">行口市場</button>
          </div>
          <div class="market-list" id="w-mkt-section"></div>
        </div>
        <div class="card">
          <div class="card-title" id="w-news-ct">相關新聞 <span class="card-title-sub">農傳媒 · 農糧署</span></div>
          <div id="w-news-list"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<footer class="footer">
  Produced by 密菓子 · 農產報價 Pro v1.0.0 · 資料來源：農業部開放資料平台
</footer>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="index.html" class="bnav-item" aria-label="行情總覽">
      <div class="bnav-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="12" width="4" height="9" rx="1" fill="currentColor" stroke="none"/>
          <rect x="10" y="7" width="4" height="14" rx="1" fill="currentColor" stroke="none"/>
          <rect x="17" y="3" width="4" height="18" rx="1" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <span class="bnav-label">行情總覽</span>
    </a>
    <a href="watchlist.html" class="bnav-item active" aria-label="我的關注">
      <div class="bnav-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"
            fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <span class="bnav-label">我的關注</span>
    </a>
    <a href="contact.html" class="bnav-item" aria-label="聯絡我們">
      <div class="bnav-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <polyline points="2,4 12,13 22,4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="bnav-label">聯絡我們</span>
    </a>
  </div>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="js/data.js"></script>
<script src="js/units.js"></script>
<script src="js/charts.js"></script>
<script src="js/news.js"></script>
<script src="js/watchlist.js"></script>
</body>
</html>
