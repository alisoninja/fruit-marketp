# .github/workflows/fetch-agri-data.yml
#
# 更新時間（台灣時間 TST = UTC+8）：
#   21:00 TST = 13:00 UTC
#   24:00 TST = 16:00 UTC
#   06:00 TST = 22:00 UTC（前一天）
#   08:00 TST = 00:00 UTC
#   10:00 TST = 02:00 UTC
#   12:00 TST = 04:00 UTC
#   15:00 TST = 07:00 UTC

name: 每日農產品行情更新

on:
  schedule:
    - cron: '0 13 * * *'   # 21:00 TST
    - cron: '0 16 * * *'   # 24:00 TST（隔天 00:00）
    - cron: '0 22 * * *'   # 06:00 TST
    - cron: '0 0  * * *'   # 08:00 TST
    - cron: '0 2  * * *'   # 10:00 TST
    - cron: '0 4  * * *'   # 12:00 TST
    - cron: '0 7  * * *'   # 15:00 TST

  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 設定 Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 執行資料抓取腳本
        run: node scripts/fetch-data.js

      - name: 設定 Git 使用者
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit 並 Push 更新後的 JSON
        run: |
          git add data/latest.json
          git diff --staged --quiet || git commit -m "chore: 農產品行情更新 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
