<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>聯絡我們 — 農產報價 Pro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <div class="logo">
      <div class="logo-sq"><div class="logo-sq-i"></div></div>
      <span>農產報價 Pro</span>
    </div>
  </div>

  <div class="topbar-date" id="topbar-date">--/--</div>

  <div class="topbar-right">
    <div class="font-ctrl">
      <button class="font-btn" onclick="fontSizeDecrease()" aria-label="縮小字體">A−</button>
      <button class="font-btn" onclick="fontSizeIncrease()" aria-label="放大字體">A+</button>
    </div>
    <nav class="topbar-nav">
      <a href="index.html"     class="nav-link">行情總覽</a>
      <a href="watchlist.html" class="nav-link">我的關注</a>
      <a href="contact.html"   class="nav-link active">聯絡我們</a>
    </nav>
  </div>
</header>

<div class="contact-hero">
  <h1>聯絡我們</h1>
  <p>有任何功能建議、資料問題或合作邀約，歡迎透過以下方式與我們聯繫，我們會盡快回覆。</p>
</div>

<div class="contact-layout">

  <!-- 左側：意見箱 -->
  <div>
    <div class="card">
      <div class="card-title">意見箱</div>
      <form id="contact-form">
        <div class="form-group">
          <label class="form-label">姓名</label>
          <input class="form-input" type="text" id="field-name" placeholder="你的姓名" required>
        </div>
        <div class="form-group">
          <label class="form-label">電子信箱</label>
          <input class="form-input" type="email" id="field-email" placeholder="example@mail.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">意見類別</label>
          <select class="form-select" id="field-category">
            <option value="">請選擇類別</option>
            <option value="feature">功能建議</option>
            <option value="data">資料問題（報價有誤 / 資料缺漏）</option>
            <option value="bug">頁面錯誤</option>
            <option value="collab">合作邀約</option>
            <option value="other">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">內容</label>
          <textarea class="form-textarea" id="field-message" placeholder="請詳細描述你的問題或建議…" required></textarea>
        </div>
        <button type="submit" class="form-submit">送出意見</button>
        <div class="success-msg" id="success-msg">感謝你的回饋！我們已收到你的留言，將盡快與你聯繫。</div>
      </form>
    </div>
  </div>

  <!-- 右側：聯絡方式 -->
  <div>
    <div class="contact-info-card">
      <h3>聯絡方式</h3>

      <div class="contact-row">
        <div class="contact-icon">✉</div>
        <div>
          <div style="font-weight:500;margin-bottom:3px">電子信箱</div>
          <a href="mailto:mifruitw@gmail.com" style="color:var(--blue-text)">mifruitw@gmail.com</a>
        </div>
      </div>

      <div class="contact-row">
        <div class="contact-icon">🌐</div>
        <div>
          <div style="font-weight:500;margin-bottom:3px">官方網站</div>
          <a href="https://mifruitw.com/" target="_blank" rel="noopener"
            style="color:var(--blue-text)">mifruitw.com</a>
        </div>
      </div>

      <div class="contact-row">
        <div class="contact-icon">⏰</div>
        <div>
          <div style="font-weight:500;margin-bottom:3px">回覆時間</div>
          <div>週一至週五 09:00–18:00<br>假日來信將於下個工作日處理</div>
        </div>
      </div>
    </div>
  </div>

</div>

<footer class="footer">
  Produced by 密菓子 · 農產報價 Pro v1.0.2 · 資料來源：農業部開放資料平台
</footer>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="index.html"     class="bnav-item"><div class="bnav-icon">📊</div>行情總覽</a>
    <a href="watchlist.html" class="bnav-item"><div class="bnav-icon">⭐</div>我的關注</a>
    <a href="contact.html"   class="bnav-item active"><div class="bnav-icon">✉</div>聯絡我們</a>
  </div>
</nav>

<script src="js/units.js"></script>
<script>
  document.getElementById('contact-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const name    = document.getElementById('field-name').value.trim();
    const email   = document.getElementById('field-email').value.trim();
    const message = document.getElementById('field-message').value.trim();
    if (!name || !email || !message) return;
    this.style.opacity = '0.5';
    setTimeout(() => {
      this.style.opacity = '1';
      this.reset();
      const msg = document.getElementById('success-msg');
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 5000);
    }, 600);
  });
</script>
</body>
</html>
